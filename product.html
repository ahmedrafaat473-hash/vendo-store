<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VENDO - المنتج</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">VENDO</div>
  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="cart.html">🛒 السلة</a>
  </nav>
</header>

<section class="product-page">

  <div class="product-image">
    <img src="https://via.placeholder.com/400" />
  </div>

  <div class="product-options">

    <h2>تيشيرت VENDO</h2>
    <p>السعر: 299 جنيه</p>

    <h4>المقاس</h4>
    <select id="size">
      <option>S</option>
      <option>M</option>
      <option>L</option>
      <option>XL</option>
    </select>

    <h4>الخامة</h4>
    <select id="quality" onchange="updatePrice()">
      <option value="1">جيد</option>
      <option value="1.2">ممتاز</option>
      <option value="1.5">Premium</option>
    </select>

    <h4>الكمية</h4>
    <div>
      <button onclick="changeQty(-1)">-</button>
      <span id="qty">1</span>
      <button onclick="changeQty(1)">+</button>
    </div>

    <h3 id="totalPrice">الإجمالي: 299 جنيه</h3>

    <button onclick="addToCart()">🛒 إضافة للسلة</button>

  </div>

</section>

<script src="app.js"></script>
  
<button onclick="alert('الشغل شغال ✔')">اختبار</button>

</body>
</html>
